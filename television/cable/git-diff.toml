[metadata]
name = "git-diff"
description = "A channel to select files from git diff commands"
requirements = ["git"]

[source]
command = "git diff --name-only HEAD"

[preview]
command = "git diff HEAD --color=always -- '{}'"

[keybindings]
enter = "actions:cd"
shift-enter = "actions:edit"

[actions.cd]
description = "Jump to the file's directory"
command = "cd $(dirname '{}') && $SHELL"
mode = "execute"

[actions.edit]
description = "Open file in nvim"
command = "NVIM_APPNAME=nvim_windows nvim '{}'"
mode = "execute"
