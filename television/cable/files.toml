[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat"]

[source]
command = ["fd -t f", "fd -t f -H"]
# output = "cd [[ -d '{}' ]] && '{}' || $(dirname '{}')"
# output = "cd $(dirname '{}')"
# output = "~/.config/television/cable/chrdir.sh {}"

[preview]
command = "bat -n --color=always '{}'"
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
enter = "actions:cd"
shift-enter = "actions:edit"

[actions.cd]
description = "Jump to the file's directory"
command = "cd $(dirname '{}') && $SHELL"
mode = "execute"

[actions.edit]
description = "Open file in nvim"
command = "NVIM_APPNAME=nvim_windows nvim '{}'"
mode = "execute"
