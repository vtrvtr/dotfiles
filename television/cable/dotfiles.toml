[metadata]
name = "dotfiles"
description = "A channel to select from your user's dotfiles"
requirements = ["fd", "bat"]

[source]
command = "fd -t f . $HOME/.config"


[preview]
command = "bat -n --color=always '{}'"

[keybindings]
enter = "actions:cd"
shift-enter = "actions:edit"

[actions.cd]
description = "Jump to the file's directory"
command = "cd $(dirname '{}') && $SHELL"
mode = "execute"

[actions.edit]
description = "Open file in nvim"
command = "NVIM_APPNAME=nvim_windows nvim '{}'"
mode = "execute"
