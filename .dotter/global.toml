"bash/starship.sh" = "~/.vtr_bash/starship.sh"
"bash/vtr_bash.sh" = "~/.vtr_bash/vtr_bash.sh"
"bash/devbox.sh" = "~/.vtr_bash/devbox.sh"

[zsh.files]
"bash/add_vtr_bash.sh" = "~/.config/dotter/bin/add_vtr_bash.sh"
# templated form: provide a table with supported keys
"bash/post_dotter.sh.tmpl" = { target = "~/.config/dotter/bin/post_dotter.sh", type = "template" }
